<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taskoria Pixel Studio v4.0 - Export Edition</title>
<style>
    :root {
        --bg-color: #121212;
        --panel-bg: #1a1a2e;
        --accent: #f0c040;
    }

    body {
        background-color: var(--bg-color);
        color: #eee;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
    }

    h1 { 
        margin-bottom: 5px; 
        font-size: clamp(16px, 4vw, 24px);
        text-transform: uppercase; 
        letter-spacing: 3px; 
        color: var(--accent);
        text-align: center;
    }

    p.subtitle { color: #aaa; font-size: 0.8rem; margin-top: 0; margin-bottom: 20px; text-align: center; }

    #main-layout {
        display: flex;
        gap: 20px;
        width: 100%;
        max-width: 1400px;
        justify-content: center;
        align-items: flex-start;
    }

    /* Lienzo de Dibujo */
    #image-wrapper {
        position: relative;
        width: 100%;
        max-width: 650px;
        aspect-ratio: 1 / 1; 
        border: 4px solid #000;
        cursor: crosshair;
        touch-action: none;
        background-color: #12121e;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
        overflow: hidden;
    }

    #reference-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: 100%;
        background-position: 50% 50%;
        background-repeat: no-repeat;
        opacity: 0.5;
        pointer-events: none; 
        z-index: 1;
        image-rendering: pixelated; 
    }

    #grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(64, 1fr);
        grid-template-rows: repeat(64, 1fr);
        z-index: 2;
    }

    .grid-cell { border: 1px solid rgba(255, 255, 255, 0.02); box-sizing: border-box; }

    /* Paneles laterales */
    .panel {
        width: 100%;
        max-width: 300px;
        background-color: var(--panel-bg);
        border: 2px solid #333;
        border-radius: 8px;
        padding: 15px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 15px;
        flex-shrink: 0;
    }

    .panel-title {
        font-size: 0.9rem;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid #444;
        padding-bottom: 5px;
        display: flex;
        justify-content: space-between;
    }

    /* Paleta de Colores */
    #palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .swatch {
        width: 100%; aspect-ratio: 1/1; border: 2px solid transparent;
        border-radius: 4px; cursor: pointer; transition: transform 0.1s;
    }
    .swatch:hover { transform: scale(1.1); }
    .swatch.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 10px rgba(240, 192, 64, 0.5); }
    .swatch.eraser { background-color: #333; position: relative; }
    .swatch.eraser::after { content: 'X'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 14px; font-weight: bold; }

    .custom-color-row { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: #aaa; }
    input[type="color"] { border: none; width: 35px; height: 35px; cursor: pointer; background: none; }

    .reference-tools {
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: #0a0a0c;
        padding: 10px;
        border-radius: 4px;
        border: 1px solid #333;
    }

    .reference-tools input[type="file"] { font-size: 0.7rem; color: #aaa; margin-bottom: 5px; }

    .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.7rem;
        color: #aaa;
    }
    
    .slider-row label { width: 50px; }
    .slider-row input[type="range"] { flex-grow: 1; }

    .action-btn {
        background-color: var(--accent); color: #000; border: none; padding: 10px;
        border-radius: 4px; font-weight: bold; text-transform: uppercase; cursor: pointer;
        transition: background 0.2s; width: 100%; font-size: 0.8rem;
    }
    .action-btn:hover { background-color: #fff; }
    .action-btn.secondary { background-color: #333; color: #fff; }
    .action-btn.secondary:hover { background-color: #444; }

    input[type="text"] {
        width: 100%; padding: 8px; box-sizing: border-box; background: #0a0a0c;
        border: 1px solid #444; color: #fff; border-radius: 4px; font-family: monospace;
    }

    #session-gallery { display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto; }
    .gallery-item {
        display: flex; justify-content: space-between; align-items: center;
        background: #0a0a0c; padding: 8px; border-radius: 4px; border: 1px solid #333;
    }
    .gallery-item span { font-family: monospace; font-size: 0.8rem; color: #8bc34a; }
    .gallery-actions button {
        background: #333; color: white; border: none; padding: 4px 8px; border-radius: 2px;
        cursor: pointer; font-size: 0.7rem; margin-left: 5px;
    }
    .gallery-actions button:hover { background: #555; }
    .gallery-actions button.del:hover { background: #e74c3c; }

    #code-output {
        width: 100%; height: 120px; background-color: #0a0a0c; border: 1px solid #444;
        color: #8bc34a; font-family: 'Courier New', Courier, monospace; font-size: 0.7rem;
        padding: 10px; box-sizing: border-box; border-radius: 4px; resize: none;
    }

    .export-group {
        display: flex;
        gap: 8px;
    }

    @media (max-width: 950px) {
        #main-layout { flex-direction: column; align-items: center; }
        .panel { max-width: 650px; }
    }
</style>
</head>
<body>

<header>
    <h1>Taskoria Pixel Studio v4.0</h1>
    <p class="subtitle">Advanced Trace & Image Export</p>
</header>

<div id="main-layout">
    
    <aside class="panel">
        <div class="panel-title">Guía de Referencia</div>
        <div class="reference-tools">
            <input type="file" id="bg-upload" accept="image/*">
            <div class="slider-row"><label>Opacidad:</label><input type="range" id="bg-opacity" min="0" max="1" step="0.05" value="0.5"></div>
            <div class="slider-row"><label>Tamaño:</label><input type="range" id="bg-scale" min="10" max="1000" step="5" value="100"></div>
            <div class="slider-row"><label>Eje X:</label><input type="range" id="bg-x" min="0" max="100" step="0.5" value="50"></div>
            <div class="slider-row"><label>Eje Y:</label><input type="range" id="bg-y" min="0" max="100" step="0.5" value="50"></div>
            <button class="action-btn secondary" id="bg-clear" style="padding: 6px; font-size: 0.7rem;">Quitar Guía</button>
        </div>

        <div class="panel-title" style="margin-top: 10px;">Pinceles</div>
        <div id="palette">
            <div class="swatch active" style="background-color: #000000;" data-color="#000000"></div>
            <div class="swatch" style="background-color: #ffdbac;" data-color="#ffdbac"></div>
            <div class="swatch" style="background-color: #567194;" data-color="#567194"></div>
            <div class="swatch" style="background-color: #3a4e69;" data-color="#3a4e69"></div>
            <div class="swatch" style="background-color: #253347;" data-color="#253347"></div>
            <div class="swatch" style="background-color: #bdc3c7;" data-color="#bdc3c7"></div>
            <div class="swatch" style="background-color: #7f8c8d;" data-color="#7f8c8d"></div>
            <div class="swatch" style="background-color: #ffffff;" data-color="#ffffff"></div>
            <div class="swatch" style="background-color: #5d4037;" data-color="#5d4037"></div>
            <div class="swatch" style="background-color: #f1c40f;" data-color="#f1c40f"></div>
            <div class="swatch" style="background-color: #2e8b57;" data-color="#2e8b57"></div>
            <div class="swatch" style="background-color: #8b0000;" data-color="#8b0000"></div>
            <div class="swatch" style="background-color: #8a2be2;" data-color="#8a2be2"></div>
            <div class="swatch eraser" data-color="transparent"></div>
        </div>

        <div class="custom-color-row">
            <input type="color" id="custom-color" value="#ff0000">
            <span>Color personalizado</span>
        </div>
        <button class="action-btn secondary" id="clear-btn">Limpiar Lienzo</button>
    </aside>

    <main id="image-wrapper">
        <div id="reference-layer"></div>
        <div id="grid-overlay"></div>
    </main>

    <aside class="panel">
        <div class="panel-title">Guardar Personaje</div>
        <input type="text" id="char-name" placeholder="Nombre del archivo...">
        <button class="action-btn" id="save-btn">Guardar en Sesión</button>
        
        <div class="panel-title" style="margin-top: 10px;">Exportar Imagen</div>
        <div class="export-group">
            <button class="action-btn" id="export-png-btn" style="background-color: #2196F3;">PNG</button>
            <button class="action-btn" id="export-svg-btn" style="background-color: #9c27b0;">SVG</button>
        </div>

        <div class="panel-title" style="margin-top: 10px;">
            <span>Sesión Actual</span>
            <span id="session-count" style="color:#aaa;">0</span>
        </div>
        <div id="session-gallery">
            <p style="font-size: 0.7rem; color: #666; text-align: center; margin: 0;">Vacío.</p>
        </div>

        <div class="panel-title" style="margin-top: 10px;">Exportar JSON</div>
        <button class="action-btn" id="generate-btn" style="background-color: #8bc34a;">Generar Código</button>
        <textarea id="code-output" readonly placeholder="JSON aquí..."></textarea>
    </aside>

</div>

<script>
    const gridSize = 64;
    const gridOverlay = document.getElementById('grid-overlay');
    const palette = document.getElementById('palette');
    const customColorInput = document.getElementById('custom-color');
    const clearBtn = document.getElementById('clear-btn');
    
    // Referencias
    const bgUpload = document.getElementById('bg-upload');
    const bgOpacity = document.getElementById('bg-opacity');
    const bgScale = document.getElementById('bg-scale');
    const bgX = document.getElementById('bg-x');
    const bgY = document.getElementById('bg-y');
    const refLayer = document.getElementById('reference-layer');
    const bgClear = document.getElementById('bg-clear');

    // Sesión y Export
    const charNameInput = document.getElementById('char-name');
    const saveBtn = document.getElementById('save-btn');
    const sessionGallery = document.getElementById('session-gallery');
    const sessionCount = document.getElementById('session-count');
    const generateBtn = document.getElementById('generate-btn');
    const codeOutput = document.getElementById('code-output');
    const exportPngBtn = document.getElementById('export-png-btn');
    const exportSvgBtn = document.getElementById('export-svg-btn');

    let currentColor = "#000000";
    let isDrawing = false;
    let pixelBuffer = new Array(gridSize * gridSize).fill('transparent');
    const cells = [];
    let sessionDrawings = {};

    // 0. LÓGICA DE REFERENCIA
    function updateReferenceTransform() {
        refLayer.style.opacity = bgOpacity.value;
        refLayer.style.backgroundSize = `${bgScale.value}%`;
        refLayer.style.backgroundPosition = `${bgX.value}% ${bgY.value}%`;
    }

    bgUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                refLayer.style.backgroundImage = `url(${event.target.result})`;
                bgScale.value = 100; bgX.value = 50; bgY.value = 50;
                updateReferenceTransform();
            }
            reader.readAsDataURL(file);
        }
    });

    [bgOpacity, bgScale, bgX, bgY].forEach(el => el.addEventListener('input', updateReferenceTransform));
    bgClear.addEventListener('click', () => { refLayer.style.backgroundImage = 'none'; bgUpload.value = ''; });

    // 1. GENERAR CUADRÍCULA
    for (let i = 0; i < gridSize * gridSize; i++) {
        const cell = document.createElement('div');
        cell.classList.add('grid-cell');
        cell.dataset.index = i; 
        gridOverlay.appendChild(cell);
        cells.push(cell);

        const paint = () => {
            cell.style.backgroundColor = currentColor;
            pixelBuffer[i] = currentColor;
        };

        cell.addEventListener('pointerenter', () => { if (isDrawing) paint(); });
        cell.addEventListener('pointerdown', (e) => {
            isDrawing = true; paint(); cell.releasePointerCapture(e.pointerId);
        });
    }

    window.addEventListener('pointerup', () => { isDrawing = false; });

    // 2. PALETA Y HERRAMIENTAS
    palette.addEventListener('click', (e) => {
        const swatch = e.target;
        if (!swatch.classList.contains('swatch')) return;
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        currentColor = swatch.dataset.color;
    });

    customColorInput.addEventListener('input', (e) => {
        currentColor = e.target.value;
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    });

    function renderBufferToScreen() {
        cells.forEach((cell, i) => { cell.style.backgroundColor = pixelBuffer[i]; });
    }

    clearBtn.addEventListener('click', () => {
        if(confirm('¿Limpiar lienzo?')) {
            pixelBuffer.fill('transparent');
            renderBufferToScreen();
        }
    });

    // 3. GESTIÓN DE SESIÓN
    function updateGalleryUI() {
        const keys = Object.keys(sessionDrawings);
        sessionCount.textContent = keys.length;
        if (keys.length === 0) {
            sessionGallery.innerHTML = '<p style="font-size: 0.7rem; color: #666; text-align: center;">Vacío.</p>';
            return;
        }
        sessionGallery.innerHTML = '';
        keys.forEach(name => {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.innerHTML = `<span>${name}</span><div class="gallery-actions"></div>`;
            
            const loadBtn = document.createElement('button');
            loadBtn.textContent = '✎';
            loadBtn.onclick = () => {
                pixelBuffer = [...sessionDrawings[name]]; 
                renderBufferToScreen();
                charNameInput.value = name;
            };

            const delBtn = document.createElement('button');
            delBtn.textContent = 'X';
            delBtn.className = 'del';
            delBtn.onclick = () => { delete sessionDrawings[name]; updateGalleryUI(); };

            div.querySelector('.gallery-actions').appendChild(loadBtn);
            div.querySelector('.gallery-actions').appendChild(delBtn);
            sessionGallery.appendChild(div);
        });
    }

    saveBtn.addEventListener('click', () => {
        let name = charNameInput.value.trim() || "sprite_" + Date.now().toString().slice(-4);
        charNameInput.value = name;
        sessionDrawings[name] = [...pixelBuffer];
        updateGalleryUI();
    });

    // 4. EXPORTACIÓN A IMAGEN (PNG & SVG)
    exportPngBtn.addEventListener('click', () => {
        const canvas = document.createElement('canvas');
        canvas.width = gridSize; canvas.height = gridSize;
        const ctx = canvas.getContext('2d');
        pixelBuffer.forEach((color, i) => {
            if (color !== 'transparent') {
                ctx.fillStyle = color;
                ctx.fillRect(i % gridSize, Math.floor(i / gridSize), 1, 1);
            }
        });
        const link = document.createElement('a');
        link.download = `${charNameInput.value || 'pixelart'}.png`;
        link.href = canvas.toDataURL();
        link.click();
    });

    exportSvgBtn.addEventListener('click', () => {
        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${gridSize} ${gridSize}" shape-rendering="crispEdges">`;
        pixelBuffer.forEach((color, i) => {
            if (color !== 'transparent') {
                svg += `<rect x="${i % gridSize}" y="${Math.floor(i / gridSize)}" width="1" height="1" fill="${color}"/>`;
            }
        });
        svg += `</svg>`;
        const blob = new Blob([svg], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${charNameInput.value || 'pixelart'}.svg`;
        link.click();
        URL.revokeObjectURL(url);
    });

    // 5. EXPORTACIÓN JSON
    generateBtn.addEventListener('click', () => {
        const exportData = {};
        if (Object.keys(sessionDrawings).length === 0) {
            exportData["current"] = pixelBuffer;
        } else {
            Object.assign(exportData, sessionDrawings);
        }
        codeOutput.value = JSON.stringify(exportData);
    });

</script>
</body>
</html>
