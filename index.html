<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taskoria Pixel Mapper - Tablet & Stylus Ready</title>
<style>
    :root {
        --bg-color: #121212;
        --panel-bg: #1a1a2e;
        --accent: #f0c040;
    }

    body {
        background-color: var(--bg-color);
        color: var(--accent);
        font-family: 'Courier New', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
    }

    h1 { 
        margin-bottom: 20px; 
        font-size: clamp(14px, 4vw, 24px); /* Texto responsive */
        text-transform: uppercase; 
        letter-spacing: 3px; 
        text-align: center;
    }

    #mapper-container {
        display: flex;
        gap: 20px;
        width: 100%;
        max-width: 1200px;
        justify-content: center;
        align-items: flex-start;
    }

    /* Contenedor de la Imagen y Cuadrícula - AHORA RESPONSIVE */
    #image-wrapper {
        position: relative;
        width: 100%;
        max-width: 800px; /* Tamaño máximo en PC */
        aspect-ratio: 1 / 1; /* Mantiene el cuadrado perfecto siempre */
        border: 4px solid #000;
        cursor: crosshair;
        /* CRUCIAL PARA LÁPIZ/TÁCTIL: Evita que la pantalla se mueva al dibujar */
        touch-action: none; 
        background-color: #222;
    }

    #source-image {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        opacity: 0.5; /* Opacidad para ver bien lo que pintamos encima */
    }

    #grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(64, 1fr);
        grid-template-rows: repeat(64, 1fr);
    }

    .grid-cell {
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-sizing: border-box;
        /* Transición suave al pintar */
        transition: background-color 0.1s; 
    }

    /* Panel de Información y Herramientas */
    #info-panel {
        width: 100%;
        max-width: 300px;
        background-color: var(--panel-bg);
        border: 2px solid #5d6d7e;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 15px;
        flex-shrink: 0; /* Evita que el panel se encoja en PC */
    }

    #info-panel div { font-size: 14px; }
    .label { color: #aaa; margin-right: 5px; }
    .value { font-weight: bold; }

    /* Selector de color para dibujar */
    .tool-section {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #444;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    input[type="color"] {
        border: none;
        width: 40px;
        height: 40px;
        cursor: pointer;
        background: none;
    }

    button {
        background: var(--accent);
        color: #000;
        border: none;
        padding: 10px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 4px;
        width: 100%;
    }

    /* MEDIA QUERY PARA TABLETAS Y MÓVILES */
    @media (max-width: 850px) {
        #mapper-container {
            flex-direction: column; /* Apila el panel debajo del lienzo */
            align-items: center;
        }
        #info-panel {
            max-width: 100%; /* El panel ocupa todo el ancho disponible */
        }
    }
</style>
</head>
<body>

<h1>Taskoria: Mapper & Stylus Draw</h1>

<div id="mapper-container">
    <div id="image-wrapper">
        <img src="freepik_genera-sprites-pixel-art-8bit-personajes-rpgmedieval-inspirados-en-dragones-mazmorras-sin-fondo-minimalista_0001.jpg" id="source-image" alt="Referencia">
        <div id="grid-overlay"></div>
    </div>

    <div id="info-panel">
        <div><span class="label">Total Cuadros:</span><span class="value">4096 (64x64)</span></div>
        <div><span class="label">Cuadro actual:</span><span id="current-index" class="value">-</span></div>
        <div><span class="label">Coordenadas:</span><span id="current-coords" class="value">-</span></div>
        
        <div class="tool-section">
            <input type="color" id="paint-color" value="#f0c040">
            <span class="label">Color de Lápiz</span>
        </div>

        <button id="clear-btn">Borrar Dibujo</button>
    </div>
</div>

<script>
    const gridSize = 64;
    const gridOverlay = document.getElementById('grid-overlay');
    const currentIndex = document.getElementById('current-index');
    const currentCoords = document.getElementById('current-coords');
    const colorPicker = document.getElementById('paint-color');
    const clearBtn = document.getElementById('clear-btn');

    let isDrawing = false;
    let cells = [];

    // 1. GENERAR LA CUADRÍCULA
    for (let i = 0; i < gridSize * gridSize; i++) {
        const cell = document.createElement('div');
        cell.classList.add('grid-cell');
        cell.dataset.index = i; 
        gridOverlay.appendChild(cell);
        cells.push(cell);

        // Lógica para actualizar las coordenadas en el panel
        const updateInfo = () => {
            const x = i % gridSize;
            const y = Math.floor(i / gridSize);
            currentIndex.textContent = i;
            currentCoords.textContent = `(${x}, ${y})`;
        };

        // Lógica para pintar
        const paint = () => {
            cell.style.backgroundColor = colorPicker.value;
        };

        // EVENTOS POINTER (Soportan Ratón, Dedo y Lápiz Óptico)
        
        // Al entrar en la celda (arrastrando)
        cell.addEventListener('pointerenter', (e) => {
            updateInfo();
            if (isDrawing) paint();
        });

        // Al tocar/hacer clic en la celda
        cell.addEventListener('pointerdown', (e) => {
            isDrawing = true;
            updateInfo();
            paint();
            // CRUCIAL: Liberar la captura del puntero permite que 'pointerenter' 
            // se dispare en otras celdas mientras arrastras el lápiz o el dedo.
            cell.releasePointerCapture(e.pointerId);
        });
    }

    // Detener el dibujo cuando se levanta el lápiz/dedo o se sale del área
    window.addEventListener('pointerup', () => { isDrawing = false; });
    window.addEventListener('pointercancel', () => { isDrawing = false; });

    // Botón para limpiar
    clearBtn.addEventListener('click', () => {
        cells.forEach(cell => cell.style.backgroundColor = 'transparent');
    });

</script>

</body>
</html>
